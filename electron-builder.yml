appId: com.pdfx.app
productName: PDFx
directories:
  buildResources: build
files:
  - '**/*'
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.prettierignore,.prettierrc.yaml,.editorconfig,dev-app-update.yml,README.md,SPEC.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,yarn.lock}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!scripts/**'
  - '!packages/**'
  # Ship only the compiled native addon, not its sources or build tree.
  - '!native/**'
  - 'native/build/Release/*.node'
  - '!resources/**'
asarUnpack:
  - native/build/Release/*.node
  # Native addons cannot dlopen from inside the asar. @napi-rs/canvas is required
  # at runtime by the inlined pdfjs Node-compat layer (globalThis.DOMMatrix polyfill)
  # — without it the main process crashes at boot with "DOMMatrix is not defined".
  - '**/*.node'
extraResources:
  - from: resources/ocr
    to: ocr
  # rebuildLegible resolves the OpenDyslexic font at process.resourcesPath/fonts
  # in packaged builds (getOpenDyslexicPath in @pdfx/core watermark.ts).
  - from: resources/fonts
    to: fonts
fileAssociations:
  - ext: pdfx
    name: PDFX Collection
    description: PDFX multi-document PDF collection
    mimeType: application/x-pdfx
    role: Viewer
mac:
  category: public.app-category.productivity
win:
  executableName: pdfx
linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Office
  maintainer: Alex Gounis <gounisalex@gmail.com>
  synopsis: One file. Many documents. Still a PDF.
  description: An open, backwards-compatible PDF extension that bundles many documents into one valid PDF, plus a minimal desktop viewer that splits it back into the original files.
deb:
  afterInstall: &after-install build/linux/after-install.tpl
rpm:
  afterInstall: *after-install
flatpak:
  runtimeVersion: '23.08'
  baseVersion: '23.08'
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
npmRebuild: false
